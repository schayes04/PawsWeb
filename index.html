<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paws: Dog Care Tracker</title>
  <meta name="description" content="Paws helps you keep your dog's care schedule, reminders, and routines in one place.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f9f7f2;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, #fef3c7 0%, transparent 40%),
        radial-gradient(circle at 90% 85%, #dbeafe 0%, transparent 45%),
        var(--bg);
    }

    main {
      width: min(680px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
    }

    .pill {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--accent);
      background: var(--accent-soft);
    }

    .cta {
      margin-top: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      color: #ffffff;
      background: var(--accent);
      pointer-events: none;
      opacity: 0.75;
    }

  </style>
</head>
<body>
  <main>
    <span class="pill">Coming Soon</span>
    <h1>Paws: Dog Care Tracker</h1>
    <p>
      Keep feeding, walks, meds, and routines organized for your dog.
      The iOS app is currently in progress and will be available on the App Store soon.
    </p>
    <a class="cta" href="#" aria-disabled="true">Download on the App Store</a>
  </main>
</body>
</html>
